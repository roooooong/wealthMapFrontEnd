<div class="app-wrapper">
  @if (showHeader) {
  <div class="frameCss" [class.scrolled]="isScrolled">
    <div class="headerCss">

      <label class="logo" (click)="home()">WM</label>
      @if (role === 'ADMIN' || role === 'USER') {
      <app-header-user></app-header-user>
      } @else {
      <app-header-visitor></app-header-visitor>
      }
    </div>
  </div>
  }
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
  @if (showHeader) {

  <div class="footerCss">
    <br>
    <div style="position: absolute;top: 25px;">
      <button class="headerbtn" style="left:50px;" (click)="setService()">服務條款</button>
      <span class="footerSpan">|</span>
      <button class="headerbtn" style="left:65px;" (click)="setPrivacyPolicy()">隱私政策</button>
      <span class="footerSpan">|</span>
      <button class="headerbtn" style="left:80px;" (click)="setAboutUs()">關於我們</button>
    </div>
    <span class="copyright">© 2026 WealthMap 版權所有</span>
  </div>
  }
</div>
