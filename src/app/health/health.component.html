<div class="grid">

  <!-- 🟦 資產分布 -->
  <div class="card">
    <h3>資產分布</h3>
    <div echarts [options]="assetChartOption" style="height:300px"></div>
  </div>

  <!-- 🟥 負債分布 -->
  <div class="card">
    <h3>負債分布</h3>
    <div echarts [options]="debtChartOption" style="height:300px"></div>
  </div>

  <!-- 🟨 財務健康 -->
  <div class="card">
    <h3>財務健康分析</h3>
    <div echarts [options]="radarChartOption" style="height:350px"></div>
  </div>

</div>

<!-- 🔥 分數顯示 -->
<div class="score-box">
  <h2>財務評分：{{ healthData?.score | number:'1.0-0' }}</h2>
  <p>等級：{{ healthData?.level }}</p>
</div>

<!-- 🔥 建議 -->
<div class="card">
  <h3>建議</h3>
  <ul>
    <li *ngFor="let item of healthData?.advice">
      {{ item }}
    </li>
  </ul>
</div>
