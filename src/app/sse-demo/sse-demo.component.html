<div class="card p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">SSE Real-time Events</h2>
    <div class="flex gap-2">
      <p-button
        label="Clear"
        icon="pi pi-trash"
        severity="secondary"
        (onClick)="clearMessages()"
        [disabled]="messages().length === 0">
      </p-button>
    </div>
  </div>


  <div class="grid mb-4">
    <div class="col-12 md:col-6 lg:col-4">
      <div class="flex flex-column gap-2">
        <label for="userId">User ID</label>
        <div class="flex gap-2">
          <input
            pInputText
            id="userId"
            [(ngModel)]="userId"
            [disabled]="isConnected()"
            placeholder="Enter User ID" />

          @if (!isConnected()) {
            <p-button
              label="Connect"
              icon="pi pi-link"
              (onClick)="connect()">
            </p-button>
          } @else {
            <p-button
              label="Disconnect"
              icon="pi pi-unlink"
              severity="danger"
              (onClick)="disconnect()">
            </p-button>
          }
        </div>
      </div>
    </div>
  </div>


  <div class="flex align-items-center gap-2 mb-4">
    <span class="font-bold">Status:</span>
    @if (isConnected()) {
      <p-tag severity="success" value="Connected" icon="pi pi-check-circle"></p-tag>
    } @else {
      <p-tag severity="secondary" value="Disconnected" icon="pi pi-info-circle"></p-tag>
    }
  </div>


  <p-card header="Message Stream">
    @if (messages().length === 0) {
      <div class="text-center p-4 text-500">
        No messages yet. Connect to start receiving events.
      </div>
    } @else {
      <p-timeline [value]="messages()">
        <ng-template pTemplate="content" let-message>
          <div class="flex flex-column mb-3">
            <span class="font-bold">{{ message.content }}</span>
            <small class="text-500">{{ message.timestamp | date:'mediumTime' }}</small>
          </div>
        </ng-template>
        <ng-template pTemplate="marker" let-message>
          <span
            class="flex w-2rem h-2rem align-items-center justify-content-center text-white border-circle z-1 shadow-1"
            [style.background-color]="message.type === 'info' ? 'var(--blue-500)' : 'var(--green-500)'">
            <i [class]="message.type === 'info' ? 'pi pi-info' : 'pi pi-bell'"></i>
          </span>
        </ng-template>
      </p-timeline>
    }
  </p-card>
</div>
