<br>
<div style="margin: 20px 20px 0px 20px;">
  <div style="display: flex;align-items:baseline;">
    <span class="name">Hi,{{userName}}</span>
    @if(userLevel){
      <span class="type">[{{ translateLevel(userLevel)}}]</span>
    }
  </div>
</div>
<hr>
<br>
<div style="margin: 10px;"></div>
<div class="frameCss">
  <div class="form-container">
    <div class="form-group">
      <label>暱稱</label>
      <input type="text" [(ngModel)]="userName" readonly>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input style="background-color: #f7f7f7;" [(ngModel)]="userEmail" readonly>
    </div>

    @if(changePwd){
      <div class="form-group">
        <label>舊密碼</label>
        <input type="password" (blur)="validate('oldPassword')" [(ngModel)]="oldPassword" placeholder="請輸入舊密碼">
        @if (oldPasswordErrorMsg) {
        <span class="error-msg" style="color: red; font-size: 12px;">
          {{ oldPasswordErrorMsg }}
        </span>
        }
      </div>
      <div class="form-group">
        <label>新密碼</label>
        <input type="password" (blur)="validate('newPassword')" [(ngModel)]="newPassword" placeholder="請輸入新密碼">
        @if (newPasswordErrorMsg) {
        <span class="error-msg" style="color: red; font-size: 12px;">
          {{ newPasswordErrorMsg }}
        </span>
        }
      </div>
      <div class="form-group">
        <label>確認新密碼</label>
        <input type="password" (blur)="validate('newPassword2')" [(ngModel)]="newPassword2" placeholder="請再次輸入新密碼">
        @if (newPassword2ErrorMsg) {
        <span class="error-msg" style="color: red; font-size: 12px;">
          {{ newPassword2ErrorMsg }}
        </span>
        }
      </div>
      <div class="form-group">
        <label></label>
        <button class="pwd-btn" (click)="ChangePwd()">確認修改</button>
        <button class="pwd-btn" (click)="cancle()">取消</button>
      </div>
    } @else {
      <div class="form-group">
        <label>密碼</label>
        <button class="pwd-btn" (click)="toChangePwd()">修改密碼</button>
      </div>
    }
  </div>
</div>
<br><br>
<div style="display: flex;align-items:baseline;">
  <a routerLink="/risk-test" routerLinkActive="risk-test-link" class="newTest">重新測驗【風險屬性評估表】>>></a>
</div>
<br>
